    <script>
        window.onkeydown = function(e) {
            if (e.keyCode === 116 || (e.ctrlKey && e.keyCode === 82)) {
                e.preventDefault();
                return false;
            }
        };

        document.addEventListener('dblclick', function(e) {
            e.preventDefault();
        }, { passive: false });

        document.addEventListener('wheel', function(e) {
            if (e.ctrlKey) {
                e.preventDefault();
            }
        }, { passive: false });

            if (e.touches.length > 1) {
                e.preventDefault();
            }
